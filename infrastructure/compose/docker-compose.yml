services:
  qdrant:
    image: qdrant/qdrant
    container_name: mini-openai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  llm-service:
    build:
      context: ../../services/llm-service
      dockerfile: Dockerfile
    container_name: mini-openai-llm-service
    environment:
      LOG_LEVEL: INFO
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: phi3:latest
      REQUEST_TIMEOUT_SECONDS: 120
    ports:
      - "8001:8001"
    depends_on:
      - qdrant

  embedding-service:
    build:
      context: ../../services/embedding-service
      dockerfile: Dockerfile
    container_name: mini-openai-embedding-service
    environment:
      LOG_LEVEL: INFO
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      NORMALIZE_EMBEDDINGS: "true"
    ports:
      - "8002:8002"

  rag-service:
    build:
      context: ../../services/rag-service
      dockerfile: Dockerfile
    container_name: mini-openai-rag-service
    environment:
      LOG_LEVEL: INFO
      EMBEDDING_SERVICE_URL: http://embedding-service:8002
      LLM_SERVICE_URL: http://llm-service:8001
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: rag_chunks
      VECTOR_SIZE: 384
      CHUNK_SIZE_WORDS: 120
      CHUNK_OVERLAP_WORDS: 20
      DEFAULT_TOP_K: 3
    ports:
      - "8003:8003"
    depends_on:
      - qdrant
      - llm-service
      - embedding-service

  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: mini-openai-api-gateway
    environment:
      LOG_LEVEL: INFO
      API_GATEWAY_API_KEY: dev-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - llm-service
      - embedding-service
      - rag-service

volumes:
  qdrant_data:
