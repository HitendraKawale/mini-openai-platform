global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8000

  - job_name: llm-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - llm-service:8001

  - job_name: embedding-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - embedding-service:8002

  - job_name: rag-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - rag-service:8003
