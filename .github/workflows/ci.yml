name: mini-openai-platform-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python files
        run: |
          python -m compileall services tests

      - name: Run unit tests
        run: |
          pytest tests -q

  docker-builds:
    runs-on: ubuntu-latest
    needs: python-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml config

      - name: Build api-gateway image
        run: |
          docker build -t mini-openai-api-gateway-ci ./services/api-gateway

      - name: Build llm-service image
        run: |
          docker build -t mini-openai-llm-service-ci ./services/llm-service

      - name: Build embedding-service image
        run: |
          docker build -t mini-openai-embedding-service-ci ./services/embedding-service

      - name: Build rag-service image
        run: |
          docker build -t mini-openai-rag-service-ci ./services/rag-service
